<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>FBA清关单批量生成工具（多账号版）</title>
    <style>
        *{box-sizing: border-box;margin:0;padding:0;font-family:Microsoft Yahei}
        body{padding:40px;background:#f5f7fa}
        .container{max-width:900px;margin:0 auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 12px #e2e8f0}
        h2{color:#222;margin-bottom:24px;text-align:center}
        .upload-block{margin:18px 0}
        label{display:block;margin-bottom:8px;font-weight:500;color:#333}
        input[type="file"]{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px}
        .select-box{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:16px}
        button{width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:16px;margin-top:20px;cursor:pointer}
        button:hover{background:#1d4ed8}
        #log{margin-top:20px;padding:12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;min-height:100px;white-space:pre-wrap}
    </style>
</head>
<body>
    <div class="container">
        <h2>FBA清关单模板批量生成系统（多账号版）</h2>

        <div class="upload-block">
            <label>1. 上传数据源附件（含FBA明细）</label>
            <input type="file" id="fileData" accept=".xlsx,.xls">
        </div>

        <div class="upload-block">
            <label>2. 选择发货账号</label>
            <select class="select-box" id="accountSel">
                <option value="">请选择账号</option>
                <option value="39">账号39：Shenzhen Longyuan Junjie Technology Co., Ltd.</option>
                <option value="79">账号79：Mingtongsheng (Shenzhen) E-commerce Co., Ltd.</option>
                <option value="76">账号76：Shenzhen Chengziwei Technology Co., Ltd.</option>
                <option value="47.92">账号47.92：Shenzhen Dongshan Jinhao Technology Co., Ltd.</option>
                <option value="47.100">账号47.100：Shenzhen Weizhite Technology Co., Ltd.</option>
                <option value="47.99">账号47.99：Shenzhen Shunhuixiong Technology Co., Ltd.</option>
                <option value="70">账号70：Shenzhen Xingyuepan Technology Co., Ltd.</option>
                <option value="71">账号71：Shenzhen Chenghai Liufa Technology Co., Ltd.</option>
                <option value="8.1">账号8.1：Shenzhen Shiqi Jiechao Technology Co., Ltd.</option>
                <option value="47.108">账号47.108：Guangzhou Changyou Weilin Technology Co., Ltd.</option>
                <option value="47.239">账号47.239：Hong Kong LingLingQinLv Technology Limited</option>
            </select>
        </div>

        <button id="genBtn">开始批量生成文件</button>
        <div id="log">运行日志：等待上传数据源并选择账号...</div>
    </div>

    <script>
        const logDom = document.getElementById('log');
        const genBtn = document.getElementById('genBtn');
        const fileData = document.getElementById('fileData');
        const accountSel = document.getElementById('accountSel');

        genBtn.onclick = async ()=>{
            logDom.innerText = "开始校验文件...\n";
            const dataFile = fileData.files[0];
            const accId = accountSel.value;

            if(!dataFile){
                logDom.innerText += "错误：请上传数据源Excel文件！\n";
                return;
            }
            if(!accId){
                logDom.innerText += "错误：请选择发货账号！\n";
                return;
            }
            logDom.innerText += `已选择账号${accId}，正在解析Excel...\n`;

            const formData = new FormData();
            formData.append("dataFile", dataFile);
            formData.append("account", accId);

            try{
                const resp = await fetch("/api/generate", {
                    method: "POST",
                    body: formData
                });
                const res = await resp.json();
                if(res.code===0){
                    logDom.innerText += `生成完成！共${res.fileCount}个FBA文件，正在打包下载...\n`;
                    logDom.innerText += `制造商信息已成功写入：${res.manufacturerInfo}\n`;
                    window.open(res.downloadUrl);
                }else{
                    logDom.innerText += `失败：${res.msg}\n`;
                }
            }catch(e){
                logDom.innerText += `请求后端失败，请先启动Python服务：${e.message}\n`;
            }
        }
    </script>
</body>
</html>
